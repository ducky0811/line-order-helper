<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#ff6b35">
  <title>線上點餐</title>
  <link rel="stylesheet" href="/shop/styles.css?v=20260620-4">
  <link rel="stylesheet" href="/shop/brand.css?v=20260621-4">
</head>
<body>
  <header id="hero" class="hero">
    <div class="hero-copy"><img id="storeLogo" class="store-logo" alt="商家 Logo" hidden><span id="storeName">今日新鮮供應</span><h1 id="tagline">想吃什麼，慢慢挑</h1><p id="storeDescription">選好商品後直接送出訂單，店家確認後會通知您。</p></div>
  </header>
  <main>
    <div id="closedNotice" class="closed-notice" hidden>店家目前暫停接單，您仍可以查看菜單。</div>
    <section class="section-head"><div><small>MENU</small><h2>熱門商品</h2></div><button id="openCart" class="cart-button">購物車 <b id="cartCount">0</b></button></section>
    <div id="productList" class="products"><div class="loading">正在準備菜單…</div></div>
    <footer id="storeInfo" class="store-info"></footer>
    <a id="platformBrand" class="platform-brand" href="/admin/" target="_blank" rel="noopener">本商店使用「<strong>接單小幫手</strong>」提供線上訂購服務</a>
  </main>

  <aside id="cartSheet" class="sheet" aria-hidden="true">
    <button id="sheetBackdrop" class="backdrop" aria-label="關閉購物車"></button>
    <section class="sheet-card">
      <div class="handle"></div>
      <div class="sheet-title"><h2>您的購物車</h2><button id="closeCart">×</button></div>
      <div id="cartItems"></div>
      <div class="total"><span>合計</span><strong id="cartTotal">NT$ 0</strong></div>
      <button id="startCheckout" class="primary">填寫訂購資料</button>
    </section>
  </aside>

  <dialog id="checkoutDialog">
    <form id="checkoutForm">
      <div class="dialog-title"><div><small>CHECKOUT</small><h2>訂購資料</h2></div><button id="closeCheckout" type="button">×</button></div>
      <label id="customerNameField"><span id="customerNameLabel">取貨人姓名</span><input id="customerName" required maxlength="60" autocomplete="name"></label>
      <label id="phoneField"><span id="phoneLabel">聯絡電話</span><input id="phone" required maxlength="30" inputmode="tel" autocomplete="tel"></label>
      <div id="fulfillmentChoices" class="choice"></div>
      <label>付款方式</label><div class="choice"><label id="cashChoice"><input type="radio" name="paymentMethod" value="cash" checked> 現金取貨</label><label id="bankChoice"><input type="radio" name="paymentMethod" value="bank_transfer"> 銀行轉帳</label></div>
      <label id="pickupTimeField"><span id="pickupTimeLabel">希望取貨時間</span><input id="pickupTime" placeholder="例如：今天 18:30"></label>
      <label id="noteField"><span id="noteLabel">備註</span><textarea id="note" rows="3" maxlength="300" placeholder="例如：飲料去冰、抵達請電話通知"></textarea></label>
      <div class="checkout-total"><span>訂單金額</span><strong id="checkoutTotal">NT$ 0</strong></div>
      <p id="checkoutError" class="error"></p>
      <button id="submitOrder" class="primary" type="submit">送出訂單</button>
    </form>
  </dialog>

  <dialog id="successDialog" class="success-dialog"><div class="success-icon">✓</div><h2>訂單已送出</h2><p id="successText"></p><section id="paymentInfo" class="payment-info" hidden></section><section id="claimBox" class="claim-box" hidden><small>LINE 確認訊息</small><code id="claimMessage"></code><button id="copyClaim" class="copy-button" type="button">複製確認訊息</button><p>若 LINE 沒有自動帶入文字，請貼上這段訊息並送出。</p></section><a id="lineConfirm" class="primary line-confirm" href="#" hidden>開啟官方 LINE</a><a id="trackOrder" class="track-link" href="#">查看訂單進度／回填末五碼</a><button id="finishOrder" class="secondary">完成</button></dialog>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js" defer></script>
  <script src="/shop/app.js?v=20260621-6" defer></script>
</body>
</html>
